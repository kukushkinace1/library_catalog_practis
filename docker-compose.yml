version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: library_catalog_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_catalog
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d library_catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: library_catalog_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_catalog_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/library_catalog
      API_V1_PREFIX: /api/v1
      LOG_LEVEL: INFO
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      OPENLIBRARY_CACHE_TTL: 3600
      SEARCH_CACHE_TTL: 300
      JWT_SECRET_KEY: super-secret-key
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  redis_data:
